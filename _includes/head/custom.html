{% include base_path %}

<!-- Faded Alps background image, visible in the side gutters on desktop. -->
<style>
  body {
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.8)),
      url('{{ base_path }}/images/bkg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }
  @media (max-width: 768px) {
    body { background-image: none; }
  }

  /* Make the central content column near-opaque so text is easy to read.
     Adjust the 0.92 alpha to taste: closer to 1.0 = more opaque. */
  .page__inner-wrap {
    background-color: rgba(255, 255, 255, 0.85);
    padding: 1em 1.5em;
    border-radius: 4px;
  }
</style>
