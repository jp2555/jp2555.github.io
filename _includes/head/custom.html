{% include base_path %}

<!-- Faded Alps background image, visible in the side gutters on desktop. -->
<style>
  body {
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.75)),
      url('{{ base_path }}/images/bkg.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
  }
  @media (max-width: 768px) {
    body { background-image: none; }
  }

  /* Make the central content column near-opaque so text is easy to read. */
  .page__inner-wrap {
    background-color: rgba(255, 255, 255, 0.92);
    padding: 1em 1.5em;
    border-radius: 4px;
  }

  /* Use dark teal-green (#085950) for title links instead of the default
     light blue, for better readability against the faded alpine background. */
  .archive__item-title a,
  .archive__item-title a:visited,
  .page__title a,
  .page__title a:visited {
    color: #085950;
  }
  .archive__item-title a:hover,
  .page__title a:hover {
    color: #04362f;
    text-decoration: underline;
  }
</style>
